<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gedankenstreich Intro</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top, #2d3250, #161a2d 60%, #0b0d18);
      color: #f2f5ff;
    }

    main {
      text-align: center;
      padding: 2rem;
    }

    h1 {
      margin-bottom: 0.5rem;
      letter-spacing: 0.04em;
    }

    p {
      margin-top: 0;
      color: #d3daf8;
    }

    .actions {
      margin-top: 1rem;
      display: inline-flex;
      gap: 0.75rem;
      align-items: center;
    }

    a,
    button {
      border: 1px solid #8fa3ff;
      background: transparent;
      color: #f2f5ff;
      border-radius: 999px;
      padding: 0.5rem 0.9rem;
      font: inherit;
      text-decoration: none;
      cursor: pointer;
    }

    button:disabled {
      cursor: default;
      opacity: 0.65;
    }
  </style>
</head>
<body>
  <main>
    <h1>Gedankenstreich</h1>
    <p>Preparing the next experience…</p>
    <div class="actions">
      <a href="under-construction/" aria-label="Continue to under construction page">Continue to under-construction page</a>
      <button id="stay-on-intro" type="button" aria-label="Cancel automatic redirect to under construction page">Cancel redirect</button>
    </div>
    <noscript>
      <p><a href="under-construction/">Continue to the site</a></p>
    </noscript>
  </main>
  <script>
    const REDIRECT_DELAY_MILLISECONDS = 2200;
    const redirectTimer = window.setTimeout(() => {
      window.location.href = new URL("under-construction/", window.location.href).toString();
    }, REDIRECT_DELAY_MILLISECONDS);

    const stayOnIntroButton = document.getElementById("stay-on-intro");
    if (!(stayOnIntroButton instanceof HTMLButtonElement)) {
      throw new Error("Missing required #stay-on-intro button");
    }

    stayOnIntroButton.addEventListener("click", () => {
      window.clearTimeout(redirectTimer);
      stayOnIntroButton.disabled = true;
      stayOnIntroButton.textContent = "Redirect canceled";
    });
  </script>
</body>
</html>
